apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: green-trade-mongo
  namespace: green-trade
  labels:
    app.kubernetes.io/name: green-trade
    app.kubernetes.io/component: mongo
spec:
  serviceName: green-trade-mongo-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: green-trade
      app.kubernetes.io/component: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: green-trade
        app.kubernetes.io/component: mongo
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mongo
          image: mongo:8.0
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - --replSet
            - rs0
            - --bind_ip_all
          ports:
            - name: mongo
              containerPort: 27017
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    until mongosh --quiet --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1; do
                      sleep 2
                    done

                    if ! mongosh --quiet --eval "rs.status().ok" >/dev/null 2>&1; then
                      mongosh --quiet --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '${POD_NAME}.green-trade-mongo-headless.${NAMESPACE}.svc.cluster.local:27017' }] })"
                    fi
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mongosh --quiet --eval "rs.status().ok" >/dev/null 2>&1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi