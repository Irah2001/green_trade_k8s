name: CI/CD - Validate & Deploy

# Déclencher la pipeline sur chaque push sur main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1 : Valider le formatage YAML
  lint:
    name: Lint YAML Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint on k8s manifests
        run: yamllint k8s/

  # Job 2 : Valider la compatibilité Kubernetes
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate all manifests
        run: |
          echo "Validating k8s manifests with kubeconform..."
          kubeconform -summary -strict -ignore-missing-schemas k8s/

  # Job 3 : Scanner les vulnérabilités de sécurité
  security-scan:
    name: Security Scan with kubesec
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubesec
        run: |
          wget https://github.com/controlplaneio/kubesec/releases/latest/download/kubesec_linux_amd64.tar.gz
          tar xf kubesec_linux_amd64.tar.gz
          sudo mv kubesec /usr/local/bin/

      - name: Run kubesec scan
        run: |
          echo "Scanning for security issues..."
          kubesec scan k8s/deployments/*.yaml k8s/security/*.yaml || true
          # Note: `|| true` pour ne pas bloquer sur les avertissements bas niveau

